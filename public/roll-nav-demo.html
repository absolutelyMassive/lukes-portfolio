<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roll nav — madewithgsap-style</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 48px 24px;
        background: #0a0a0a;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      .nav-pill {
        display: flex;
        align-items: center;
        gap: 32px;
        padding: 12px 20px;
        background: #e8e8e8;
        border-radius: 9999px;
        max-width: 100%;
      }

      .nav-left {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }

      .nav-center {
        display: flex;
        align-items: center;
        gap: 28px;
        flex: 1;
        justify-content: center;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }

      /* --- Roll link --------------------------------------------------- */

      .roll-link {
        overflow: hidden;
        height: 1.2em;
        line-height: 1.2;
        display: inline-flex;
        align-items: flex-start;
        text-decoration: none;
        color: #0a0a0a;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .roll-link .translate {
        display: flex;
        flex-direction: column;
        transition: transform 0.4s cubic-bezier(0.76, 0, 0.24, 1);
      }

      .roll-link:hover .translate {
        transform: translateY(-50%);
      }

      .roll-link .line {
        display: block;
        height: 1.2em;
        line-height: 1.2;
        flex-shrink: 0;
      }

      /* COLLECTION + badge as one roll group */
      .roll-group {
        overflow: hidden;
        height: 1.2em;
        line-height: 1.2;
        display: inline-flex;
        align-items: flex-start;
        text-decoration: none;
        color: #0a0a0a;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .roll-group .translate {
        display: flex;
        flex-direction: column;
        transition: transform 0.4s cubic-bezier(0.76, 0, 0.24, 1);
      }

      .roll-group:hover .translate {
        transform: translateY(-50%);
      }

      .roll-group .line {
        display: flex;
        align-items: center;
        gap: 10px;
        height: 1.2em;
        line-height: 1.2;
        flex-shrink: 0;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 28px;
        padding: 2px 8px;
        background: #f5f5f5;
        border-radius: 9999px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      /* Icon button */
      .icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border: 0;
        border-radius: 50%;
        background: #ffffff;
        color: #0a0a0a;
        cursor: pointer;
        text-decoration: none;
        font-size: 18px;
        line-height: 1;
        transition: opacity 0.2s ease;
      }

      .icon-btn:hover {
        opacity: 0.85;
      }

      /* JOIN CTA */
      .cta-join {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 18px;
        background: #22c55e;
        color: #0a0a0a;
        border: 0;
        border-radius: 9999px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        text-decoration: none;
        cursor: pointer;
        transition: opacity 0.2s ease;
      }

      .cta-join:hover {
        opacity: 0.9;
      }

      .cta-join .arrow {
        font-size: 14px;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <nav class="nav-pill" aria-label="Main">
      <div class="nav-left">
        <a class="roll-group" href="#">
          <span class="translate">
            <span class="line">
              <span>Collection</span>
              <span class="badge">102</span>
            </span>
            <span class="line">
              <span>Collection</span>
              <span class="badge">102</span>
            </span>
          </span>
        </a>
      </div>

      <div class="nav-center">
        <a class="roll-link" href="#">
          <span class="translate">
            <span class="line">Pricing</span>
            <span class="line">Pricing</span>
          </span>
        </a>
        <a class="roll-link" href="#">
          <span class="translate">
            <span class="line">FAQ</span>
            <span class="line">FAQ</span>
          </span>
        </a>
        <a class="roll-link" href="#">
          <span class="translate">
            <span class="line">Showcase</span>
            <span class="line">Showcase</span>
          </span>
        </a>
      </div>

      <div class="nav-right">
        <a class="icon-btn" href="#" aria-label="Menu">☰</a>
        <a class="cta-join" href="#">
          Join
          <span class="arrow" aria-hidden="true">→</span>
        </a>
      </div>
    </nav>
  </body>
</html>
